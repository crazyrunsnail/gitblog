name: Generate GitBlog README

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  push:
    branches:
      - master
    paths:
      - main.py

jobs:
  sync:
    name: Generate README
    runs-on: ubuntu-latest
    if: github.repository_owner_id == github.event.issue.user.id || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: pip
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate new md
        env:
          MD_HEAD: |
            ## [Gitblog](https://crazyrunsnail.github.io/gitblog/)

            My personal blog([About Me](https://github.com/crazyrunsnail/gitblog/issues/2)) using issues and GitHub Actions (随意转载，无需署名)![image](https://github.com/user-attachments/assets/a168bf11-661e-4566-b042-7fc9544de528)

            [RSS Feed](https://raw.githubusercontent.com/{repo_name}/master/feed.xml)
        run: |
          python main.py ${{ secrets.G_T }} ${{ github.repository }} --issue_number '${{ github.event.issue.number }}'

      - name: Push README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add BACKUP/*.md
          git commit -a -m 'update new blog' || echo "nothing to commit"
          git push || echo "nothing to push"
